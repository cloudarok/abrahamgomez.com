<html>
<head>
<title>Abraham</title>
<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.4.2/jquery.min.js"></script>
<style type="text/css">
	body {
		background-color: #000;
		margin: 0;
		padding: 0;
		overflow: hidden;
	}

	#console {
		font-family: courier, monospace;
		color: #fff;
		max-width:750px;
		width: 90%;
		margin-left:auto;
		margin-right:auto;
		margin-top:100px;
		padding-bottom: 80px;
		font-size:14px;
		display: none;
		word-wrap: break-word;
		overflow-wrap: break-word;
	}

	#a {
		color: #0bc;
	}

	.b {
		color: rgb(224, 102, 102);
	}

	.c {
		color: #00e500;
		text-decoration: none;
	}

	#d {
		color: #FFD700;
	}

	a:link {
		color: #00e500;
		text-decoration: underline;
	}

	a:visited {
		color: #00e500;
		text-decoration: none;
	}

	ol {
		margin-top: 0px;
		margin-bottom: 0px;
	}

	li {
		list-style-type: none;
		margin-top: 0px;
		margin-bottom: 0px;
	}

	#intro-canvas {
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		height: 100%;
		z-index: 100;
	}

	#welcome-text {
		position: fixed;
		top: 50%;
		left: 50%;
		transform: translate(-50%, -50%);
		font-family: courier, monospace;
		color: #fff;
		font-size: 24px;
		letter-spacing: 8px;
		z-index: 101;
		opacity: 0;
		text-transform: lowercase;
	}

	#click-to-start {
		position: fixed;
		top: 50%;
		left: 50%;
		transform: translate(-50%, -50%);
		font-family: courier, monospace;
		color: rgba(255,255,255,0.6);
		font-size: 16px;
		letter-spacing: 4px;
		z-index: 102;
		cursor: pointer;
		text-transform: lowercase;
		display: none;
	}

	#click-to-start:hover {
		color: rgba(255,255,255,0.9);
	}

	#mute-btn {
		position: fixed;
		bottom: 20px;
		left: 20px;
		font-family: courier, monospace;
		color: rgba(255,255,255,0.5);
		font-size: 12px;
		background: none;
		border: 1px solid rgba(255,255,255,0.2);
		padding: 6px 12px;
		cursor: pointer;
		z-index: 200;
		text-transform: lowercase;
		display: none;
	}

	#mute-btn:hover {
		color: rgba(255,255,255,0.8);
		border-color: rgba(255,255,255,0.4);
	}

</style>
<meta content="text/html;charset=utf-8" http-equiv="Content-Type">
<meta content="utf-8" http-equiv="encoding">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<audio id="bg-music" src="./peaceful.mp3" preload="auto"></audio>
<canvas id="intro-canvas"></canvas>
<div id="click-to-start">click anywhere</div>
<div id="welcome-text">welcome</div>
<div id="console"></div>
<button id="mute-btn">mute</button>

<script type="text/javascript">

// ── INTRO ANIMATION ──
(function() {
	var canvas = document.getElementById('intro-canvas');
	var ctx = canvas.getContext('2d');
	var welcomeEl = document.getElementById('welcome-text');
	var muteBtn = document.getElementById('mute-btn');

	function resize() {
		canvas.width = window.innerWidth;
		canvas.height = window.innerHeight;
	}
	resize();
	window.addEventListener('resize', resize);

	// ── SNOW ──
	var snowflakes = [];
	var NUM_SNOW = 220;
	for (var i = 0; i < NUM_SNOW; i++) {
		var x = Math.random() * canvas.width;
		snowflakes.push({
			x: x,
			y: -(Math.random() * 800),
			r: Math.random() * 2.5 + 0.5,
			speed: Math.random() * 2.5 + 1.2,
			wind: Math.random() * 0.4 - 0.2,
			wobble: Math.random() * Math.PI * 2,
			wobbleSpeed: Math.random() * 0.02 + 0.01,
			opacity: Math.random() * 0.6 + 0.2,
			delay: Math.random() * 2500
		});
	}

	function updateSnow(elapsed) {
		for (var i = 0; i < snowflakes.length; i++) {
			var s = snowflakes[i];
			if (elapsed < s.delay) continue;
			s.y += s.speed;
			s.wobble += s.wobbleSpeed;
			s.x += s.wind + Math.sin(s.wobble) * 0.3;
			// respawn at top when falling off bottom or drifting off sides
			if (s.y > canvas.height + 10 || s.x > canvas.width + 10 || s.x < -10) {
				s.y = -5;
				s.x = Math.random() * canvas.width;
			}
		}
	}

	function drawSnow(globalAlpha, elapsed) {
		for (var i = 0; i < snowflakes.length; i++) {
			var s = snowflakes[i];
			if (elapsed < s.delay || s.y < 0) continue;
			ctx.beginPath();
			ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
			ctx.fillStyle = 'rgba(255,255,255,' + (s.opacity * globalAlpha) + ')';
			ctx.fill();
		}
	}

	// ── MUSIC ──
	var music = document.getElementById('bg-music');
	var clickPrompt = document.getElementById('click-to-start');
	var introStarted = false;
	var isMuted = false;

	muteBtn.addEventListener('click', function(e) {
		e.stopPropagation();
		isMuted = !isMuted;
		music.muted = isMuted;
		muteBtn.textContent = isMuted ? 'unmute' : 'mute';
	});

	// animation state
	var startTime = null;
	var SNOW_DURATION = 9400;     // snow falling on black for 9.4s
	var WELCOME_FADE_IN = 1200;   // welcome fades in 1.2s
	var WELCOME_HOLD = 1000;      // welcome holds 1s
	var FADE_OUT = 1500;          // fade out 1.5s
	// total = 13100ms = 13.1 seconds
	var introRunning = false;

	function beginIntro() {
		if (introStarted) return;
		introStarted = true;
		clickPrompt.style.display = 'none';
		music.currentTime = 0;
		music.play();
		startTime = Date.now();
		introRunning = true;
		introLoop();
	}

	// try autoplay
	var autoplayPromise = music.play();
	if (autoplayPromise !== undefined) {
		autoplayPromise.then(function() {
			music.currentTime = 0;
			startTime = Date.now();
			introRunning = true;
			introStarted = true;
			introLoop();
		}).catch(function() {
			clickPrompt.style.display = 'block';
		});
	} else {
		startTime = Date.now();
		introRunning = true;
		introStarted = true;
		introLoop();
	}

	document.addEventListener('click', beginIntro);
	document.addEventListener('keydown', beginIntro);

	function introLoop() {
		if (!introRunning) return;

		var elapsed = Date.now() - startTime;
		var w = canvas.width;
		var h = canvas.height;

		// black background
		ctx.fillStyle = '#000';
		ctx.fillRect(0, 0, w, h);

		// timeline
		var snowEnd = SNOW_DURATION;
		var welcomeStart = snowEnd;
		var welcomeFadeEnd = welcomeStart + WELCOME_FADE_IN;
		var welcomeHoldEnd = welcomeFadeEnd + WELCOME_HOLD;
		var fadeEnd = welcomeHoldEnd + FADE_OUT;

		// global fade
		var globalAlpha = 1;
		if (elapsed > welcomeHoldEnd) {
			globalAlpha = 1 - Math.min(1, (elapsed - welcomeHoldEnd) / FADE_OUT);
		}

		// snow
		updateSnow(elapsed);
		drawSnow(globalAlpha, elapsed);

		// welcome text
		if (elapsed > welcomeStart && elapsed < fadeEnd) {
			var welcomeAlpha = 0;
			if (elapsed < welcomeFadeEnd) {
				welcomeAlpha = (elapsed - welcomeStart) / WELCOME_FADE_IN;
			} else if (elapsed < welcomeHoldEnd) {
				welcomeAlpha = 1;
			} else {
				welcomeAlpha = 1 - (elapsed - welcomeHoldEnd) / FADE_OUT;
			}
			welcomeEl.style.opacity = Math.max(0, welcomeAlpha);
		}

		// end intro
		if (elapsed >= fadeEnd) {
			introRunning = false;
			canvas.style.display = 'none';
			welcomeEl.style.display = 'none';
			document.body.style.overflow = 'auto';
			document.getElementById('console').style.display = 'block';
			muteBtn.style.display = 'block';
			startTyper();
			return;
		}

		requestAnimationFrame(introLoop);
	}

	// ── TYPEWRITER (original, deferred start) ──
	window.startTyper = function() {
		var Typer={
		text: null,
		accessCountimer:null,
		index:0,
		speed:50,
		file:"",
		accessCount:0,
		deniedCount:0,
		init: function(){
			Typer.accessCountimer=setInterval(function(){Typer.updLstChr();},500);
			$.get(Typer.file, function(data){
				Typer.text=data;
				Typer.text = Typer.text.slice(0, Typer.text.length-1);
			});
		},

		content:function(){
			return $("#console").html();
		},

		write:function(str){
			$("#console").append(str);
			return false;
		},

		makeAccess:function(){
			Typer.hidepop();
			Typer.accessCount=0;
			var ddiv=$("<div id='gran'>").html("");
			ddiv.addClass("accessGranted");
			ddiv.html("<h1>ACCESS GRANTED</h1>");
			$(document.body).prepend(ddiv);
			return false;
		},
		makeDenied:function(){
			Typer.hidepop();
			Typer.deniedCount=0;
			var ddiv=$("<div id='deni'>").html("");
			ddiv.addClass("accessDenied");
			ddiv.html("<h1>ACCESS DENIED</h1>");
			$(document.body).prepend(ddiv);
			return false;
		},

		hidepop:function(){
			$("#deni").remove();
			$("#gran").remove();
		},

		addText:function(key){
			if(key.keyCode==18){
				Typer.accessCount++;
				if(Typer.accessCount>=3){
					Typer.makeAccess();
				}
			}else if(key.keyCode==20){
				Typer.deniedCount++;
				if(Typer.deniedCount>=3){
					Typer.makeDenied();
				}
			}else if(key.keyCode==27){
				Typer.hidepop();
			}else if(Typer.text){
				var cont=Typer.content();
				if(cont.substring(cont.length-1,cont.length)=="|")
					$("#console").html($("#console").html().substring(0,cont.length-1));
				if(key.keyCode!=8){
					Typer.index+=Typer.speed;
				}else{
					if(Typer.index>0)
						Typer.index-=Typer.speed;
				}
				var text=Typer.text.substring(0,Typer.index)
				var rtn= new RegExp("\n", "g");

				var scrollY = window.scrollY;
				$("#console").html(text.replace(rtn,"<br/>"));
				window.scrollTo(0, scrollY);
			}
			if ( key.preventDefault && key.keyCode != 122 ) {
				key.preventDefault()
			};
			if(key.keyCode != 122){
				key.returnValue = false;
			}
		},

		updLstChr:function(){
			var cont=this.content();
			var scrollY = window.scrollY;
			if(cont.substring(cont.length-1,cont.length)=="|")
				$("#console").html($("#console").html().substring(0,cont.length-1));
			else
				this.write("|");
			window.scrollTo(0, scrollY);
		}
		};

		Typer.speed=8;
		Typer.file="./resume.txt";
		Typer.init();

		var timer = setInterval(function(){
			Typer.addText({"keyCode": 123748});
			if (Typer.index > Typer.text.length) {
				clearInterval(timer);
			}
		}, 80);
	};
})();

</script>
</body>
</html>
